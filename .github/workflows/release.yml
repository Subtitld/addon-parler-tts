name: Release

# Cuts the platform zips for the Parler-TTS Mini v1 add-on, attaches
# them to a GitHub Release, and pings the catalog repo.
#
# Parler hard-pins transformers==4.46.1 and bundles ~2 GB of weights
# (auto-downloaded at runtime, not bundled). Build time is dominated
# by torch + transformers, similar to qwen3-tts.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)release (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform_suffix: linux-x86_64
          - os: macos-latest
            platform_suffix: macos-universal
          - os: windows-latest
            platform_suffix: windows-x86_64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          MANIFEST_VERSION=$(python -c "import json; print(json.load(open('manifest.json'))['version'])")
          if [ "$VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::tag $TAG implies version $VERSION but manifest.json declares $MANIFEST_VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install build deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install torch --extra-index-url https://download.pytorch.org/whl/cpu
          # parler-tts hard-pins transformers==4.46.1 — drift in either
          # direction has broken Parler before. Letting pip resolve from
          # the package metadata keeps us on the version Parler upstream
          # tested against.
          pip install parler-tts

      - name: Build add-on bundle
        run: pyinstaller parler-tts-addon.spec --distpath dist/

      - name: Smoke test frozen binary (hello frame)
        shell: bash
        run: |
          set -e
          BIN_DIR="dist/parler-tts-addon"
          BIN_NAME="parler-tts-addon"
          if [ "$RUNNER_OS" = "Windows" ]; then BIN_NAME="${BIN_NAME}.exe"; fi
          BIN="$BIN_DIR/$BIN_NAME"
          # Wrapper writes `hello` immediately; one line + EOF on stdin
          # exits clean. 30 s allows for torch/transformers to load.
          HELLO=$(timeout 30 "$BIN" < /dev/null | head -n 1)
          echo "frame: $HELLO"
          python - "$HELLO" <<'PY'
          import json, sys
          frame = json.loads(sys.argv[1])
          assert frame.get('type') == 'hello', frame
          assert frame.get('addon') == 'parler-tts', frame
          caps = frame.get('capabilities') or []
          assert any(c.get('task') == 'tts.synthesize' for c in caps), caps
          tts = next(c for c in caps if c.get('task') == 'tts.synthesize')
          voices = tts.get('voices') or []
          # Manifest declares 34 named speakers; sanity-check that
          # at least the recommended ones are present.
          ids = {v.get('id') for v in voices}
          for expected in ('parler-laura', 'parler-jon', 'parler-jenna'):
              assert expected in ids, f"missing voice {expected}: {ids}"
          PY

      - name: Pack zip
        id: pack
        shell: bash
        run: |
          set -e
          VERSION="${{ steps.ver.outputs.version }}"
          PLAT="${{ matrix.platform_suffix }}"
          ZIP_NAME="parler-tts-${VERSION}-${PLAT}.zip"
          STAGE="$RUNNER_TEMP/stage"
          mkdir -p "$STAGE/bin"
          cp -r dist/parler-tts-addon/* "$STAGE/bin/"
          cp manifest.json LICENSE README.md "$STAGE/"
          python - "$STAGE" "$GITHUB_WORKSPACE/${ZIP_NAME%.zip}" <<'PY'
          import shutil, sys
          shutil.make_archive(sys.argv[2], 'zip', sys.argv[1])
          PY
          echo "zip_path=$GITHUB_WORKSPACE/$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Compute sha256 sidecar
        shell: bash
        run: |
          ZIP="${{ steps.pack.outputs.zip_path }}"
          if command -v sha256sum >/dev/null; then
            sha256sum "$(basename "$ZIP")" > "${ZIP}.sha256"
          else
            shasum -a 256 "$(basename "$ZIP")" > "${ZIP}.sha256"
          fi
          cat "${ZIP}.sha256"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: zip-${{ matrix.platform_suffix }}
          path: |
            ${{ steps.pack.outputs.zip_path }}
            ${{ steps.pack.outputs.zip_path }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Resolve tag
        id: tagref
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -e
          TAG="${{ steps.tagref.outputs.tag }}"
          mapfile -t ASSETS < <(find artifacts -type f \( -name '*.zip' -o -name '*.sha256' \))
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Automated release for parler-tts $TAG." \
              "${ASSETS[@]}"
          fi

      - name: Trigger Subtitld catalog rebuild
        env:
          GH_TOKEN: ${{ secrets.SUBTITLD_BOT_TOKEN }}
        shell: bash
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::warning::SUBTITLD_BOT_TOKEN not set — catalog rebuild skipped (cron will pick this up within 6 h)"
            exit 0
          fi
          gh api repos/Subtitld/addons-catalog/dispatches \
            -f event_type=catalog-rebuild \
            -F client_payload[addon]=parler-tts \
            -F client_payload[tag]="${{ steps.tagref.outputs.tag }}"
